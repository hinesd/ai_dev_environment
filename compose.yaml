services:
  openclaw-gateway:
    build:
      context: ./src/openclaw
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    ports:
      - "127.0.0.1:${GATEWAY_PORT}:${GATEWAY_PORT}"
    env_file: [.env]
    volumes:
      - ./src/openclaw:/etc/openclaw:ro
      - ./state:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    networks:
      - openclaw-net
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${GATEWAY_PORT}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # Anchor service: exists only to bind the top-level models: element to the
  # local-model profile so Compose manages the Docker Model Runner lifecycle.
  # `sleep infinity` keeps it running so `up --wait` counts it as healthy.
  local-model:
    profiles: ["local-model"]
    image: alpine:latest
    command: sleep infinity
    restart: unless-stopped
    networks:
      - openclaw-net
    models:
      - llm

models:
  llm:
    model: ${LOCAL_MODEL_ID}
    context_size: 32768

networks:
  openclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET}
