networks:
  openclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/16

services:

  openclaw-gateway:
    build:
      context: ./openclaw/
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    environment:
      - OPENCLAW_GATEWAY_BIND=lan
      - OPENCLAW_DISABLE_BONJOUR=1
    env_file:
      - .env
    volumes:
      - ./docker_persist/config:/home/node/.openclaw
      - ./docker_persist/workspace:/home/node/.openclaw/workspace
      - ./docker_persist/auth-secrets:/home/node/.config/openclaw
    networks:
      - openclaw-net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: openclaw-caddy
    ports:
      - "${OPENCLAW_LAN_IP}:80:80"
      - "${OPENCLAW_LAN_IP}:443:443"
    volumes:
      - ./config/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    networks:
      - openclaw-net
    cap_drop:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy

volumes:
  caddy_data:
