networks:
  openclaw-net:
    driver: bridge
    ipam:
      config:
        - subnet: ${DOCKER_SUBNET}

services:

  ollama:
    image: ollama/ollama:latest
    container_name: openclaw-ollama
    profiles: ["ollama"]
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - openclaw-net
    restart: unless-stopped

  openclaw-gateway:
    build:
      context: ./src/openclaw/
      dockerfile: Dockerfile
    container_name: openclaw-gateway
    environment:
      - MODEL_DEFAULT=${MODEL_DEFAULT}
    command: node openclaw.mjs gateway
    ports:
      - "127.0.0.1:${GATEWAY_PORT}:${GATEWAY_PORT}"
      - "${STATIC_IP}:80:80"
      - "${STATIC_IP}:443:443"
    env_file:
      - environment/.env.network
      - environment/.env.secrets
    volumes:
      - ./src/openclaw:/etc/openclaw:ro
      - ./state:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    networks:
      - openclaw-net
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:${GATEWAY_PORT}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  caddy:
    build:
      context: ./src/caddy/
      dockerfile: Dockerfile
    container_name: openclaw-caddy
    network_mode: "service:openclaw-gateway"
    env_file:
      - environment/.env.network
      - environment/.env.secrets
    volumes:
      - ./src/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    cap_drop:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy

volumes:
  caddy_data:
  ollama_data:
