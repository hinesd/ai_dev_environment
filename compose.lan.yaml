# LAN overlay — merged on top of compose.yaml when MODE=lan (see Makefile).
# Adds Caddy for TLS termination and publishes 80/443 on STATIC_IP so devices
# on TRUSTED_SUBNET can connect.
#
# The 80/443 bindings live on the gateway service because Caddy shares its
# network namespace (network_mode: service:) and cannot publish ports itself.
services:
  caddy:
    build:
      context: ./src/caddy
      dockerfile: Dockerfile
    container_name: openclaw-caddy
    network_mode: "service:openclaw-gateway"
    env_file: [.env]
    volumes:
      - ./src/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
    cap_drop:
      - NET_RAW
    security_opt:
      - no-new-privileges:true
    restart: unless-stopped
    depends_on:
      openclaw-gateway:
        condition: service_healthy

  openclaw-gateway:
    ports:
      - "${STATIC_IP}:80:80"
      - "${STATIC_IP}:443:443"

volumes:
  caddy_data:
